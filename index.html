/* ============================================================================
   LEWISVILLE HIGH SCHOOL — KILLOUGH CAMPUS · FACULTY HUB
   ----------------------------------------------------------------------------
   HOW TO EDIT THIS SITE  (you only ever touch the CONFIG block in the <script>
   near the bottom — never the CSS or the render code):

   • Each entry in ITEMS is one tile. It is either:
       kind:'link'   →  opens an outside system in a new tab (Gradebook, Canvas…)
                        set  url: 'https://...'
       kind:'embed'  →  shows a Google Sheet / Slides / PDF / Calendar INSIDE
                        the page.  set  embed: 'https://...'  (see how-to below)
   • Leave url/embed as ''  →  the tile shows a tidy "add your link" screen,
     so nothing ever looks broken while you fill things in.
   • daily:true       →  the tile also appears on the Home page quick-links.
   • group: '...'     →  which Resources section it falls under.
   • To add a tile: copy a line, change the fields. To remove one: delete it.

   GETTING A GOOGLE EMBED URL:
     Sheets/Slides:  File ▸ Share ▸ Publish to web ▸ Embed ▸ copy the src="..."
     PDF in Drive:   open it ▸ ⋮ ▸ Open in new window ▸ change /view to /preview
     Calendar:       Settings ▸ Integrate calendar ▸ copy the "src" embed link
   ========================================================================== */

:root{
  --maroon:#500000;       /* official Farmer Maroon (rgb 80,0,0) */
  --maroon-deep:#3a0000;
  --maroon-lift:#6b1414;
  --gold:#E3B23C;         /* PMS 123C academic accent, sparingly */
  --white:#ffffff;
  --ink:#241b1b;
  --gray-d:#555555;
  --gray-m:#9ea1a2;
  --silver:#C5C6C7;
  --line:#e7e3e1;
  --bg:#f6f4f2;
  --card:#ffffff;
  --nav-h:64px;
  --shadow:0 1px 2px rgba(36,16,16,.05), 0 8px 24px -16px rgba(36,16,16,.25);
  --shadow-h:0 4px 10px rgba(36,16,16,.08), 0 18px 40px -20px rgba(36,16,16,.45);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:Arial,"Helvetica Neue",Helvetica,system-ui,sans-serif;
  color:var(--ink);background:var(--bg);
  -webkit-font-smoothing:antialiased;line-height:1.55;
}
a{color:inherit;text-decoration:none}
.display{font-family:"Oswald",Arial,sans-serif}
.upper{text-transform:uppercase;letter-spacing:.06em}

/* ---- top bar ---- */
header.bar{
  position:sticky;top:0;z-index:50;height:var(--nav-h);
  background:var(--maroon);color:#fff;
  border-bottom:3px solid var(--gold);
  display:flex;align-items:center;gap:18px;padding:0 22px;
}
.brand{display:flex;align-items:center;gap:12px;min-width:0}
.brand img{height:40px;width:auto;display:block}
.brand .txt{font-family:"Oswald";line-height:1;min-width:0}
.brand .txt b{display:block;font-weight:600;font-size:18px;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap}
.brand .txt span{display:block;font-size:11px;color:#e9cfcf;letter-spacing:.14em;text-transform:uppercase;font-weight:300}
nav.top{margin-left:auto;display:flex;align-items:center;gap:4px}
nav.top a, nav.top button{
  font-family:"Oswald";font-size:14px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;
  color:#f3e7e7;background:none;border:0;cursor:pointer;
  padding:9px 14px;border-radius:7px;position:relative;display:inline-flex;align-items:center;gap:6px;
}
nav.top a:hover, nav.top button:hover{background:rgba(255,255,255,.12);color:#fff}
nav.top a.active{color:#fff;background:rgba(255,255,255,.16)}
nav.top a.active::after{content:"";position:absolute;left:14px;right:14px;bottom:3px;height:2px;background:var(--gold);border-radius:2px}
.iconbtn{display:inline-flex;align-items:center;justify-content:center;width:38px;height:38px;border-radius:8px;color:#f3e7e7;background:none;border:0;cursor:pointer}
.iconbtn:hover{background:rgba(255,255,255,.12);color:#fff}
.iconbtn svg{width:20px;height:20px}
.menu-toggle{display:none}

/* ---- dropdown ---- */
.dd{position:relative}
.dd-panel{
  position:absolute;top:calc(100% + 8px);right:0;min-width:230px;background:#fff;color:var(--ink);
  border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow-h);
  padding:7px;display:none;overflow:hidden
}
.dd.open .dd-panel{display:block}
nav.top .dd-panel a{
  display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;
  font-family:Arial;font-weight:400;font-size:14px;letter-spacing:0;text-transform:none;color:var(--ink)
}
nav.top .dd-panel a:hover{background:var(--bg);color:var(--maroon)}
nav.top .dd-panel a svg{width:17px;height:17px;color:var(--maroon);flex:none}

/* ---- search overlay ---- */
.searchwrap{display:none;background:var(--maroon-deep);padding:14px 22px;border-bottom:1px solid rgba(255,255,255,.08)}
.searchwrap.open{display:block}
.searchwrap input{
  width:100%;max-width:640px;margin:0 auto;display:block;font-size:16px;font-family:Arial;
  padding:12px 16px;border-radius:10px;border:1px solid rgba(255,255,255,.2);
  background:rgba(255,255,255,.07);color:#fff;outline:none
}
.searchwrap input::placeholder{color:#caa9a9}
.searchwrap input:focus{border-color:var(--gold);background:rgba(255,255,255,.12)}

main{max-width:1180px;margin:0 auto;padding:0 22px 64px}

/* ---- hero ---- */
.hero{
  position:relative;overflow:hidden;border-radius:0 0 22px 22px;margin:0 -22px 0;
  background:var(--maroon);color:#fff;padding:54px 30px 50px;text-align:center
}
.hero::before{ /* faint star field texture */
  content:"";position:absolute;inset:0;opacity:.10;
  background-image:radial-gradient(circle at 12% 28%, #fff 0 1.4px, transparent 2px),
                   radial-gradient(circle at 78% 18%, #fff 0 1.1px, transparent 2px),
                   radial-gradient(circle at 64% 72%, #fff 0 1.5px, transparent 2px),
                   radial-gradient(circle at 30% 78%, #fff 0 1.1px, transparent 2px),
                   radial-gradient(circle at 90% 60%, #fff 0 1.2px, transparent 2px);
  background-size:240px 240px,200px 200px,260px 260px,220px 220px,180px 180px
}
.hero::after{content:"";position:absolute;left:0;right:0;bottom:0;height:5px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.hero .inner{position:relative;z-index:1}
.hero .seal{display:inline-flex;align-items:center;justify-content:center;width:128px;height:128px;border-radius:50%;background:#fff;margin-bottom:18px;box-shadow:0 8px 26px -10px rgba(0,0,0,.5);border:4px solid var(--gold)}
.hero img.crest{height:88px;width:auto;display:block}
.hero h1{font-family:"Oswald";font-weight:700;text-transform:uppercase;letter-spacing:.05em;font-size:clamp(30px,5.2vw,52px);margin:0;line-height:.98}
.hero .sub{font-family:"Oswald";font-weight:300;letter-spacing:.28em;text-transform:uppercase;font-size:clamp(12px,1.8vw,15px);color:#eccccc;margin-top:10px}
.hero .est{display:inline-flex;align-items:center;gap:9px;margin-top:18px;font-family:"Oswald";font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:#f0d9d9}
.hero .est .dot{width:5px;height:5px;border-radius:50%;background:var(--gold)}

/* ---- section heads ---- */
.section{margin-top:42px}
.section-head{display:flex;align-items:center;gap:14px;margin-bottom:18px}
.section-head h2{font-family:"Oswald";font-weight:600;text-transform:uppercase;letter-spacing:.08em;font-size:20px;margin:0;color:var(--maroon);white-space:nowrap}
.section-head .rule{height:2px;background:var(--line);flex:1;border-radius:2px}
.section-head .star{color:var(--gold);font-size:13px}

/* ---- tiles ---- */
.grid{display:grid;gap:16px;grid-template-columns:repeat(auto-fill,minmax(220px,1fr))}
.tile{
  position:relative;display:flex;flex-direction:column;gap:10px;
  background:var(--card);border:1px solid var(--line);border-radius:14px;
  padding:18px 18px 16px;cursor:pointer;box-shadow:var(--shadow);
  transition:transform .16s ease, box-shadow .16s ease, border-color .16s ease;
  opacity:0;animation:rise .5s ease forwards
}
@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.tile:hover{transform:translateY(-3px);box-shadow:var(--shadow-h);border-color:#e0d3d0}
.tile:focus-visible{outline:3px solid var(--gold);outline-offset:2px}
.tile .ico{
  width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;
  background:#f3eceb;color:var(--maroon);transition:background .16s ease,color .16s ease
}
.tile:hover .ico{background:var(--maroon);color:#fff}
.tile .ico svg{width:23px;height:23px}
.tile h3{font-family:"Oswald";font-weight:600;font-size:17px;letter-spacing:.01em;margin:0;color:var(--ink)}
.tile p{margin:0;font-size:13px;color:var(--gray-d);line-height:1.45}
.tile .ext{position:absolute;top:15px;right:15px;color:var(--gray-m)}
.tile .ext svg{width:16px;height:16px}
.tile.locked .ico{background:#efeceb;color:var(--gray-m)}
.tile .lockbadge{position:absolute;top:14px;right:14px;display:inline-flex;align-items:center;gap:5px;font-family:"Oswald";font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--gray-d);background:#f1edec;border:1px solid var(--line);padding:3px 8px;border-radius:20px}
.tile .lockbadge svg{width:11px;height:11px}

/* ---- resource group ---- */
.rgroup{margin-top:40px}

/* ---- viewer (embed / setup / data) ---- */
.viewbar{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin:26px 0 14px}
.back{display:inline-flex;align-items:center;gap:7px;font-family:"Oswald";font-weight:500;text-transform:uppercase;letter-spacing:.07em;font-size:13px;color:var(--maroon);cursor:pointer;padding:7px 12px;border:1px solid var(--line);border-radius:8px;background:#fff}
.back:hover{background:#fff;border-color:var(--silver)}
.back svg{width:16px;height:16px}
.viewbar .vtitle{font-family:"Oswald";font-weight:600;text-transform:uppercase;letter-spacing:.05em;font-size:22px;color:var(--maroon);margin:0}
.viewbar .spacer{flex:1}
.openbtn{display:inline-flex;align-items:center;gap:8px;font-family:"Oswald";font-weight:500;text-transform:uppercase;letter-spacing:.06em;font-size:13px;background:var(--maroon);color:#fff;border:0;border-radius:9px;padding:10px 16px;cursor:pointer}
.openbtn:hover{background:var(--maroon-lift)}
.openbtn svg{width:16px;height:16px}
.frame{width:100%;height:78vh;min-height:520px;border:1px solid var(--line);border-radius:14px;background:#fff;box-shadow:var(--shadow);overflow:hidden}
.frame iframe{width:100%;height:100%;border:0;display:block}

/* ---- handbook reader ---- */
.reader-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:80px 20px;color:var(--gray-m)}
.reader-loading svg{width:42px;height:42px;color:var(--silver);animation:pulse 1.3s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
.openbtn.ghost{background:#fff;color:var(--maroon);border:1px solid var(--line)}
.openbtn.ghost:hover{background:var(--bg)}
.reader{display:grid;grid-template-columns:248px 1fr;gap:28px;align-items:start;margin-top:6px}
.reader-toc{position:sticky;top:calc(var(--nav-h) + 16px);max-height:calc(100vh - var(--nav-h) - 40px);overflow:auto;border:1px solid var(--line);border-radius:14px;background:#fff;padding:10px;box-shadow:var(--shadow)}
.toc-toggle{display:none}
.toc-list{display:flex;flex-direction:column}
.toc-link{font-family:"Oswald";font-size:13.5px;font-weight:500;letter-spacing:.02em;color:var(--ink);padding:8px 10px;border-radius:8px;border-left:3px solid transparent;line-height:1.3}
.toc-link.sub{padding-left:22px;font-weight:400;font-size:13px;color:var(--gray-d)}
.toc-link:hover{background:var(--bg)}
.toc-link.active{color:var(--maroon);border-left-color:var(--gold);background:var(--bg)}
.toc-link.dim{opacity:.32}
.reader-main{min-width:0}
.reader-search{position:sticky;top:calc(var(--nav-h) + 16px);z-index:5;display:flex;align-items:center;gap:8px;background:var(--bg);padding:6px 0 12px}
.reader-search .rs-ico{display:flex;color:var(--gray-m)}
.reader-search .rs-ico svg{width:18px;height:18px}
.reader-search input{flex:1;min-width:0;font-family:Arial;font-size:15px;padding:11px 14px;border:1px solid var(--line);border-radius:10px;background:#fff;outline:none}
.reader-search input:focus{border-color:var(--maroon)}
.rs-count{font-family:"Oswald";font-size:12px;letter-spacing:.04em;color:var(--gray-d);white-space:nowrap;min-width:62px;text-align:right}
.rs-nav{display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;border:1px solid var(--line);background:#fff;border-radius:8px;color:var(--maroon);cursor:pointer;flex:none}
.rs-nav:hover{background:var(--bg)}
.rs-nav svg{width:15px;height:15px}
.rs-nav.rs-next svg{transform:rotate(180deg)}
.reader-doc{background:#fff;border:1px solid var(--line);border-radius:16px;padding:34px 40px;box-shadow:var(--shadow);max-width:74ch}
.reader-doc .rsec{scroll-margin-top:calc(var(--nav-h) + 70px)}
.reader-doc .rsec + .rsec{margin-top:30px;padding-top:28px;border-top:1px solid var(--line)}
.reader-doc .rsec-h{font-family:"Oswald";font-weight:600;text-transform:uppercase;letter-spacing:.03em;font-size:21px;color:var(--maroon);margin:0 0 12px}
.reader-doc .rh{font-family:"Oswald";font-weight:600;color:var(--ink);margin:20px 0 8px;font-size:16px}
.reader-doc p{margin:0 0 12px;font-size:15.5px;line-height:1.7;color:#2c2424}
.reader-doc ul,.reader-doc ol{margin:0 0 14px;padding-left:22px}
.reader-doc li{font-size:15.5px;line-height:1.7;margin:3px 0;color:#2c2424}
.reader-doc a{color:var(--maroon);text-decoration:underline;text-underline-offset:2px}
.rtable{overflow-x:auto;margin:0 0 16px}
.rtable table{border-collapse:collapse;width:100%;font-size:14px}
.rtable th,.rtable td{border:1px solid var(--line);padding:8px 11px;text-align:left;vertical-align:top}
.rtable th{background:var(--bg);font-family:"Oswald";font-weight:600;letter-spacing:.02em}
.reader-doc mark{background:#ffe7a8;color:inherit;border-radius:2px;padding:0 1px}
.reader-doc mark.on{background:var(--gold);box-shadow:0 0 0 2px rgba(227,178,60,.45)}
.reader-meta{margin:16px 2px 0;font-size:12px;color:var(--gray-m);font-family:"Oswald";letter-spacing:.04em}

/* ---- setup / empty state ---- */
.setup{
  border:1px dashed var(--silver);border-radius:16px;background:#fff;padding:44px 30px;text-align:center;
  box-shadow:var(--shadow)
}
.setup .ico{width:62px;height:62px;border-radius:16px;background:#f3eceb;color:var(--maroon);display:inline-flex;align-items:center;justify-content:center;margin-bottom:16px}
.setup .ico svg{width:30px;height:30px}
.setup h3{font-family:"Oswald";font-weight:600;text-transform:uppercase;letter-spacing:.04em;font-size:22px;color:var(--maroon);margin:0 0 6px}
.setup .note{margin:0;color:var(--gray-m);font-size:13px;letter-spacing:.02em}

/* ---- data hub ---- */
.databtns{display:grid;gap:18px;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));margin-top:6px}
.databtn{
  position:relative;border:1px solid var(--line);border-radius:18px;background:#fff;padding:30px 26px;cursor:pointer;
  box-shadow:var(--shadow);transition:transform .16s ease,box-shadow .16s ease;display:flex;gap:18px;align-items:flex-start
}
.databtn:hover{transform:translateY(-3px);box-shadow:var(--shadow-h)}
.databtn .ico{width:54px;height:54px;border-radius:14px;background:var(--maroon);color:#fff;display:flex;align-items:center;justify-content:center;flex:none}
.databtn .ico svg{width:27px;height:27px}
.databtn h3{font-family:"Oswald";font-weight:600;text-transform:uppercase;letter-spacing:.04em;font-size:20px;margin:0 0 5px;color:var(--ink)}
.databtn p{margin:0;font-size:13.5px;color:var(--gray-d)}
.databtn.admin .ico{background:#efeceb;color:var(--maroon)}

/* ---- footer ---- */
footer{background:var(--maroon-deep);color:#e7cfcf;margin-top:60px}
footer .inner{max-width:1180px;margin:0 auto;padding:26px 22px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
footer img{height:34px}
footer .fb{font-family:"Oswald";text-transform:uppercase;letter-spacing:.05em}
footer .fb b{display:block;font-weight:600;font-size:14px;color:#fff;letter-spacing:.04em}
footer .fb span{font-size:11px;letter-spacing:.16em;font-weight:300}
footer .right{margin-left:auto;font-family:"Oswald";font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#c79a9a;text-align:right}

/* ---- mobile ---- */
@media (max-width:860px){
  nav.top{position:fixed;top:var(--nav-h);left:0;right:0;background:var(--maroon);
    flex-direction:column;align-items:stretch;gap:0;padding:8px;display:none;
    border-bottom:3px solid var(--gold);box-shadow:var(--shadow-h);max-height:calc(100vh - var(--nav-h));overflow:auto}
  nav.top.open{display:flex}
  nav.top a, nav.top .dd{width:100%}
  nav.top a, nav.top button{padding:13px 14px;font-size:15px}
  nav.top a.active::after{display:none}
  .dd-panel{position:static;display:block;box-shadow:none;border:0;background:transparent;padding:0 0 6px 10px}
  nav.top .dd-panel a{color:#f3e7e7}
  nav.top .dd-panel a:hover{background:rgba(255,255,255,.1);color:#fff}
  nav.top .dd-panel a svg{color:#e3b23c}
  .dd > button{display:none}
  .menu-toggle{display:inline-flex}
  .frame{height:70vh;min-height:420px}
  .hero{padding:40px 18px 38px}
  .reader{grid-template-columns:1fr;gap:14px}
  .reader-toc{position:static;max-height:none;top:auto}
  .toc-toggle{display:flex;align-items:center;gap:8px;width:100%;font-family:"Oswald";font-weight:500;text-transform:uppercase;letter-spacing:.06em;font-size:13px;color:var(--maroon);background:none;border:0;cursor:pointer;padding:6px}
  .toc-toggle svg{width:16px;height:16px}
  .reader-toc .toc-list{display:none;margin-top:6px}
  .reader-toc.open .toc-list{display:flex}
  .reader-doc{padding:22px 18px}
  .reader-search{top:var(--nav-h)}
}
@media (max-width:480px){
  .grid{grid-template-columns:1fr 1fr;gap:12px}
  .tile{padding:14px}
  .tile h3{font-size:15px}
  .tile p{display:none}
  .brand .txt span{display:none}
}
</style>
</head>

const app = document.getElementById("app");
const byId = id => ITEMS.find(x => x.id === id);
const dest = it => it.kind === "link" ? (it.url||"") : (it.embed||"");
const esc = s => (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

function tileHTML(it){
  const isLink = it.kind === "link";
  const set = !!dest(it);
  const corner = isLink && set ? `<span class="ext">${icon("ext")}</span>` : "";
  return `<a class="tile" href="#/view/${it.id}" data-anim>
    <span class="ico">${icon(it.icon)}</span>
    <h3>${esc(it.label)}</h3>
    <p>${esc(it.desc||"")}</p>
    ${corner}
  </a>`;
}
function stagger(){
  document.querySelectorAll('[data-anim]').forEach((el,i)=>{ el.style.animationDelay=(i*40)+"ms"; });
}
function head(title){
  return `<div class="section-head"><h2>${esc(title)}</h2><span class="star">${icon("star")}</span><span class="rule"></span></div>`;
}

function renderResources(groupFilter){
  const groups = groupFilter ? [groupFilter] : GROUP_ORDER;
  let html = `<div class="section" style="margin-top:30px">${head(groupFilter || "All Resources")}</div>`;
  groups.forEach(g=>{
    const items = ITEMS.filter(x=>x.group===g);
    if(!items.length) return;
    html += `<div class="rgroup">${groupFilter?"":`<div class="section-head"><h2>${esc(g)}</h2><span class="star">${icon("star")}</span><span class="rule"></span></div>`}
      <div class="grid">${items.map(tileHTML).join("")}</div></div>`;
  });
  app.innerHTML = html;
  stagger();
}

function viewerShell(title, inner){
  return `<div class="viewbar">
      <a class="back" href="javascript:history.back()">${icon("back")} Back</a>
      <h1 class="vtitle">${esc(title)}</h1>
      <span class="spacer"></span>
    </div>${inner}`;
}
function embedView(title, url, openUrl){
  if(url){
    const open = `<button class="openbtn" onclick="window.open('${esc(openUrl||url)}','_blank')">${icon("ext")} Open in new tab</button>`;
    return `<div class="viewbar">
        <a class="back" href="javascript:history.back()">${icon("back")} Back</a>
        <h1 class="vtitle">${esc(title)}</h1>
        <span class="spacer"></span>${open}
      </div>
      <div class="frame"><iframe src="${esc(url)}" allowfullscreen loading="lazy"></iframe></div>`;
  }
  return viewerShell(title, setupCard(title, "embed"));
}
function setupCard(title, mode){
  const note = mode==="embed" ? "Embed not added yet"
             : mode==="reader" ? "Add the Apps Script Web App URL (the handbook \u201csrc\u201d) in the config"
             : "Link not added yet";
  return `<div class="setup">
    <span class="ico">${icon(mode==="reader"?"book":(mode==="embed"?"layers":"ext"))}</span>
    <h3>${esc(title)}</h3>
    <p class="note">${note}</p>
  </div>`;
}

function renderView(id){
  const it = byId(id);
  if(!it){ renderHome(); return; }
  if(it.kind === "reader"){ renderReader(it); return; }
  const d = dest(it);
  if(it.kind === "link"){
    if(d){ window.open(d, "_blank"); history.back(); return; }
    app.innerHTML = viewerShell(it.label, setupCard(it.label, "link"));
  } else {
    app.innerHTML = embedView(it.label, d, d);
  }
}

/* ---------- Handbook reader: live Google Doc via Apps Script JSON ---------- */
let READER_CACHE = {};   // src -> parsed data, cached for the session

function renderReader(it){
  if(!it.src){ app.innerHTML = viewerShell(it.label, setupCard(it.label, "reader")); return; }
  app.innerHTML = `<div class="viewbar">
      <a class="back" href="javascript:history.back()">${icon("back")} Back</a>
      <h1 class="vtitle">${esc(it.label)}</h1>
      <span class="spacer"></span>
    </div>
    <div class="reader-loading">${icon("book")}<p>Loading the handbook…</p></div>`;
  const data = READER_CACHE[it.src];
  if(data){ paintReader(it, data); return; }
  loadJsonp(it.src, (err, data) => {
    if(err || !data || data.error){
      const msg = (data && data.error) ? data.error
                : (err && err.message === "timeout") ? "The handbook service didn't respond."
                : "Couldn't reach the handbook service.";
      const box = app.querySelector(".reader-loading");
      if(box) box.innerHTML =
        `<h3 style="font-family:Oswald;color:var(--maroon);margin:0 0 8px">Couldn't load the handbook</h3>
         <p class="note">${esc(String(msg))}</p>
         <p class="note">Make sure you're signed in to your LISD Google account, then Refresh.</p>
         ${it.url ? `<a class="openbtn" href="${esc(it.url)}" target="_blank" style="margin-top:14px;text-decoration:none">${icon("ext")} Open in Google Docs</a>` : ""}`;
      return;
    }
    READER_CACHE[it.src] = data;
    paintReader(it, data);
  });
}

/* JSONP loader: loads the Apps Script web app via a <script> tag so it works
   across domains (and with domain-restricted deployments) without CORS. */
function loadJsonp(url, cb){
  const name = "__hb_" + Math.random().toString(36).slice(2);
  let done = false;
  const s = document.createElement("script");
  const cleanup = () => { try{ delete window[name]; }catch(e){ window[name]=undefined; } if(s.parentNode) s.parentNode.removeChild(s); clearTimeout(timer); };
  window[name] = (data) => { if(done) return; done = true; cleanup(); cb(null, data); };
  const timer = setTimeout(() => { if(done) return; done = true; cleanup(); cb(new Error("timeout")); }, 15000);
  s.onerror = () => { if(done) return; done = true; cleanup(); cb(new Error("network")); };
  s.src = url + (url.indexOf("?") === -1 ? "?" : "&") + "callback=" + name;
  document.body.appendChild(s);
}

function paintReader(it, data){
  const secs = (data.sections||[]).filter(s => s.title || (s.blocks&&s.blocks.length));
  const toc = secs.map(s =>
    `<a class="toc-link${s.level===2?" sub":""}" href="#__noop" data-go="${s.anchor}">${esc(s.title)}</a>`).join("");
  const blocksHTML = b => {
    if(b.type==="p")  return `<p>${b.html}</p>`;
    if(b.type==="h")  return `<h${b.level===3?3:4} class="rh">${b.html}</h${b.level===3?3:4}>`;
    if(b.type==="ul") return `<ul>${b.items.map(i=>`<li>${i}</li>`).join("")}</ul>`;
    if(b.type==="ol") return `<ol>${b.items.map(i=>`<li>${i}</li>`).join("")}</ol>`;
    if(b.type==="table") return `<div class="rtable"><table>${b.rows.map((row,ri)=>
        `<tr>${row.map(c=>`<${ri===0?"th":"td"}>${esc(c)}</${ri===0?"th":"td"}>`).join("")}</tr>`).join("")}</table></div>`;
    return "";
  };
  const body = secs.map(s =>
    `<section class="rsec" id="${s.anchor}" data-title="${esc(s.title)}">
       <h2 class="rsec-h">${esc(s.title)}</h2>
       ${(s.blocks||[]).map(blocksHTML).join("")}
     </section>`).join("");

  app.innerHTML = `
    <div class="viewbar">
      <a class="back" href="javascript:history.back()">${icon("back")} Back</a>
      <h1 class="vtitle">${esc(it.label)}</h1>
      <span class="spacer"></span>
      ${it.url ? `<button class="openbtn ghost" onclick="window.open('${esc(it.url)}','_blank')">${icon("ext")} Google Docs</button>`:""}
      <button class="openbtn" id="hbRefresh">${icon("refresh")} Refresh</button>
    </div>
    <div class="reader">
      <aside class="reader-toc">
        <button class="toc-toggle" id="tocToggle">${icon("layers")} Contents</button>
        <div class="toc-list" id="tocList">${toc}</div>
      </aside>
      <div class="reader-main">
        <div class="reader-search">
          <span class="rs-ico">${icon("search")}</span>
          <input id="hbSearch" type="search" placeholder="Search the handbook…" autocomplete="off">
          <span class="rs-count" id="hbCount"></span>
          <button class="rs-nav" id="hbPrev" title="Previous">${icon("back")}</button>
          <button class="rs-nav rs-next" id="hbNext" title="Next">${icon("back")}</button>
        </div>
        <div class="reader-doc" id="hbDoc">${body}</div>
        <p class="reader-meta">Updated from the live document${data.fetched?` · ${esc(new Date(data.fetched).toLocaleString())}`:""}</p>
      </div>
    </div>`;

  wireReader(it);
}

function wireReader(it){
  const docEl = document.getElementById("hbDoc");
  const tocList = document.getElementById("tocList");
  const input = document.getElementById("hbSearch");
  const countEl = document.getElementById("hbCount");
  let marks = [], pos = -1;

  // TOC click -> smooth scroll
  tocList.addEventListener("click", e=>{
    const a = e.target.closest("[data-go]"); if(!a) return;
    e.preventDefault();
    const t = document.getElementById(a.dataset.go);
    if(t) t.scrollIntoView({behavior:"smooth", block:"start"});
    document.querySelector(".reader-toc").classList.remove("open");
  });
  // mobile contents toggle
  document.getElementById("tocToggle").addEventListener("click", ()=>{
    document.querySelector(".reader-toc").classList.toggle("open");
  });
  // refresh = clear cache + reload
  document.getElementById("hbRefresh").addEventListener("click", ()=>{
    delete READER_CACHE[it.src]; renderReader(it);
  });

  // scrollspy: highlight active TOC entry
  const links = [...tocList.querySelectorAll("[data-go]")];
  const map = {}; links.forEach(l=>map[l.dataset.go]=l);
  const obs = new IntersectionObserver(es=>{
    es.forEach(en=>{ if(en.isIntersecting){
      links.forEach(l=>l.classList.remove("active"));
      const l = map[en.target.id]; if(l) l.classList.add("active");
    }});
  }, {rootMargin:"-10% 0px -80% 0px"});
  docEl.querySelectorAll(".rsec").forEach(s=>obs.observe(s));

  // search
  function clearMarks(){
    marks.forEach(m=>{ const t=document.createTextNode(m.textContent); m.replaceWith(t); });
    docEl.normalize(); marks=[]; pos=-1;
  }
  function applyMarks(term){
    clearMarks();
    if(term.length<2){ countEl.textContent=""; links.forEach(l=>l.classList.remove("dim")); return; }
    const low = term.toLowerCase();
    const hitSecs = new Set();
    const walker = document.createTreeWalker(docEl, NodeFilter.SHOW_TEXT, {
      acceptNode: nd => nd.nodeValue.toLowerCase().includes(low) && nd.parentNode.nodeName!=="MARK"
        ? NodeFilter.FILTER_ACCEPT : NodeFilter.FILTER_REJECT
    });
    const targets=[]; while(walker.nextNode()) targets.push(walker.currentNode);
    targets.forEach(node=>{
      const txt = node.nodeValue; const frag = document.createDocumentFragment();
      let i=0, lc=txt.toLowerCase(), idx;
      while((idx=lc.indexOf(low,i))!==-1){
        if(idx>i) frag.appendChild(document.createTextNode(txt.slice(i,idx)));
        const mk = document.createElement("mark"); mk.textContent = txt.slice(idx, idx+term.length);
        frag.appendChild(mk); marks.push(mk);
        const sec = node.parentNode.closest(".rsec"); if(sec) hitSecs.add(sec.id);
        i = idx+term.length;
      }
      if(i<txt.length) frag.appendChild(document.createTextNode(txt.slice(i)));
      node.replaceWith(frag);
    });
    links.forEach(l=>l.classList.toggle("dim", !hitSecs.has(l.dataset.go)));
    countEl.textContent = marks.length ? `${marks.length} match${marks.length>1?"es":""}` : "No matches";
    if(marks.length){ pos=0; focusMark(); }
  }
  function focusMark(){
    marks.forEach((m,i)=>m.classList.toggle("on", i===pos));
    if(marks[pos]) marks[pos].scrollIntoView({behavior:"smooth", block:"center"});
  }
  let deb;
  input.addEventListener("input", ()=>{ clearTimeout(deb); deb=setTimeout(()=>applyMarks(input.value.trim()), 180); });
  document.getElementById("hbNext").addEventListener("click", ()=>{ if(marks.length){ pos=(pos+1)%marks.length; focusMark(); }});
  document.getElementById("hbPrev").addEventListener("click", ()=>{ if(marks.length){ pos=(pos-1+marks.length)%marks.length; focusMark(); }});
  input.addEventListener("keydown", e=>{ if(e.key==="Enter" && marks.length){ e.preventDefault(); pos=(pos+(e.shiftKey?-1:1)+marks.length)%marks.length; focusMark(); }});
}

function renderForms(){
  app.innerHTML = embedView("Forms & Documents", SITE.formsEmbed, SITE.formsEmbed);
}

function renderData(sub){
  if(sub){
    const d = SITE.data[sub];
    if(!d){ renderData(); return; }
    app.innerHTML = embedView(d.title, d.embed, d.embed);
    return;
  }
  const t = SITE.data.teacher, a = SITE.data.admin;
  app.innerHTML = `
    <div class="section" style="margin-top:30px">${head("Data")}
      <div class="databtns">
        <a class="databtn" href="#/data/teacher" data-anim>
          <span class="ico">${icon("bars")}</span>
          <div><h3>${esc(t.title)}</h3><p>${esc(t.desc||"")}</p></div>
        </a>
        <a class="databtn admin" href="#/data/admin" data-anim>
          <span class="ico">${icon("lock")}</span>
          <div><h3>${esc(a.title)}</h3><p>${esc(a.desc||"")}</p></div>
        </a>
      </div>
    </div>`;
  stagger();
}

function renderSearch(q){
  const term = (q||"").trim().toLowerCase();
  const hits = !term ? [] : ITEMS.filter(x =>
    (x.label+" "+x.desc+" "+x.group).toLowerCase().includes(term));
  let inner;
  if(!term){ inner = `<p style="color:var(--gray-m);font-size:14px">Start typing to search.</p>`; }
  else if(!hits.length){ inner = `<p style="color:var(--gray-m);font-size:14px">No matches for "${esc(q)}".</p>`; }
  else { inner = `<div class="grid">${hits.map(tileHTML).join("")}</div>`; }
  app.innerHTML = `<div class="section" style="margin-top:30px">${head(term?`Results for "${esc(q)}"`:"Search")}${inner}</div>`;
  stagger();
}

/* ---- router ---- */
function setActive(route){
  document.querySelectorAll('nav.top a[data-route]').forEach(a=>{
    a.classList.toggle("active", a.dataset.route === route);
  });
}
function router(){
  const h = location.hash.replace(/^#\//,"");
  const parts = h.split("/").filter(Boolean);
  closeMenus();
  window.scrollTo(0,0);
  if(parts.length === 0){ setActive("home"); return renderHome(); }
  switch(parts[0]){
    case "resources": setActive(""); return renderResources(parts[1] ? decodeURIComponent(parts[1]) : null);
    case "forms":     setActive("forms"); return renderForms();
    case "data":      setActive("data"); return renderData(parts[1]);
    case "view":      setActive(""); return renderView(parts[1]);
    case "search":    setActive(""); return renderSearch(decodeURIComponent(parts.slice(1).join("/")));
    default:          setActive("home"); return renderHome();
  }
}
window.addEventListener("hashchange", router);

/* ---- Resources dropdown contents ---- */
(function buildDropdown(){
  const panel = document.getElementById("respanel");
  panel.innerHTML = `<a href="#/resources">${icon("folder")} All Resources</a>` +
    GROUP_ORDER.map(g=>`<a href="#/resources/${encodeURIComponent(g)}">${icon("star")} ${esc(g)}</a>`).join("");
})();

/* ---- menus / search UI ---- */
const topnav = document.getElementById("topnav");
const resdd = document.getElementById("resdd");
const swrap = document.getElementById("searchwrap");
const sinput = document.getElementById("searchInput");
function closeMenus(){ topnav.classList.remove("open"); resdd.classList.remove("open"); document.getElementById("resbtn").setAttribute("aria-expanded","false"); }

document.getElementById("menuToggle").addEventListener("click", e=>{ e.stopPropagation(); topnav.classList.toggle("open"); });
document.getElementById("resbtn").addEventListener("click", e=>{ e.stopPropagation(); const o=resdd.classList.toggle("open"); document.getElementById("resbtn").setAttribute("aria-expanded", o?"true":"false"); });
document.getElementById("searchToggle").addEventListener("click", e=>{ e.stopPropagation(); const o=swrap.classList.toggle("open"); if(o){ sinput.focus(); } });
document.addEventListener("click", e=>{ if(!resdd.contains(e.target)) resdd.classList.remove("open"); });
sinput.addEventListener("input", ()=>{ location.hash = "#/search/" + encodeURIComponent(sinput.value); });
sinput.addEventListener("keydown", e=>{ if(e.key==="Escape"){ swrap.classList.remove("open"); } });

/* boot */
router();
</script>
